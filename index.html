<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Yagodkin Word Trainer</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--bg:#07070c;--sf:#0e0e16;--sf2:#151520;--sf3:#1c1c2a;--bd:#262636;--tx:#dddbd6;--tx2:#6e6c78;--ac:#f0c040;--ac2:#3ecf8e;--rd:#ef5350;--gn:#4caf80;--bl:#5c8ee6}
html,body{min-height:100vh;min-height:100dvh;background:var(--bg);color:var(--tx);font-family:'Inter',system-ui,-apple-system,sans-serif;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;overflow-x:hidden;touch-action:pan-y}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideL{from{opacity:0;transform:translateX(40px)}to{opacity:1;transform:translateX(0)}}
@keyframes slideR{from{opacity:0;transform:translateX(-40px)}to{opacity:1;transform:translateX(0)}}
@keyframes micPulse{0%{box-shadow:0 0 0 0 rgba(239,83,80,.5)}70%{box-shadow:0 0 0 14px rgba(239,83,80,0)}100%{box-shadow:0 0 0 0 rgba(239,83,80,0)}}
@keyframes flip{0%{opacity:1}40%{opacity:0}60%{opacity:0}100%{opacity:1}}
button{cursor:pointer;font-family:inherit;border:none;outline:none;transition:all .12s}
button:active{transform:scale(.96)}
input,textarea{font-family:inherit;outline:none}

/* Layout */
nav{border-bottom:1px solid var(--bd);padding:10px 14px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--bg);z-index:50}
.wrap{max-width:700px;margin:0 auto;padding:16px 12px 120px}

/* Components */
.sf{background:var(--sf);border:1.5px solid var(--bd);border-radius:14px}
.tab{background:transparent;border:1.5px solid var(--bd);color:var(--tx2);padding:10px 16px;border-radius:8px;font-size:13px;font-weight:600;min-width:48px;min-height:48px;display:inline-flex;align-items:center;justify-content:center}
.tab:hover{border-color:#444;color:var(--tx)}
.tab.on{border-color:var(--ac);color:var(--ac);background:rgba(240,192,64,.06)}
.badge{display:inline-block;padding:3px 10px;border-radius:6px;font-size:11px;font-weight:600}
.folder{background:var(--sf);border:1.5px solid var(--bd);border-radius:14px;padding:16px;cursor:pointer;transition:all .2s;margin-bottom:10px}
.folder:hover{border-color:var(--ac)}
.folder.done{border-color:var(--gn);opacity:.85}
.toggle{display:flex;border-radius:10px;overflow:hidden;border:1.5px solid var(--bd)}
.toggle button{padding:10px 14px;background:var(--sf2);color:var(--tx2);font-size:13px;font-weight:600;border-right:1px solid var(--bd);flex:1;text-align:center;min-height:48px}
.toggle button:last-child{border-right:none}
.toggle button.on{background:rgba(240,192,64,.1);color:var(--ac)}
.card{background:var(--sf);border:1.5px solid var(--bd);border-radius:18px;padding:28px 22px;min-height:260px;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;user-select:none;cursor:pointer;transition:border-color .2s}
.card.back{border-color:var(--ac2)}
.card.animL{animation:slideL .25s ease}
.card.animR{animation:slideR .25s ease}
.card.animFlip{animation:flip .2s ease}
.nav-arrows{display:flex;gap:12px;justify-content:center;margin:14px 0;align-items:center}
.arrow{width:56px;height:56px;border-radius:50%;background:var(--sf2);border:1.5px solid var(--bd);display:flex;align-items:center;justify-content:center;font-size:22px;color:var(--tx);min-width:56px;min-height:56px}
.arrow:hover{border-color:var(--ac);color:var(--ac)}
.counter{font-size:15px;color:var(--tx2);font-weight:600;min-width:70px;text-align:center}
.assoc{background:rgba(240,192,64,.04);border:1px solid rgba(240,192,64,.12);border-radius:12px;padding:14px;margin-top:12px;width:100%}
.spk{width:52px;height:52px;border-radius:50%;border:2px solid var(--ac);background:rgba(240,192,64,.04);display:inline-flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;min-width:52px;min-height:52px}
.spk:hover{background:rgba(240,192,64,.12)}
.mic{width:60px;height:60px;border-radius:50%;border:2.5px solid var(--rd);background:rgba(239,83,80,.06);display:inline-flex;align-items:center;justify-content:center;font-size:28px;flex-shrink:0;min-width:60px;min-height:60px}
.mic.on{animation:micPulse 1.2s ease infinite;border-color:var(--rd);background:rgba(239,83,80,.15)}
.mic.ok{border-color:var(--gn);background:rgba(76,175,128,.1)}
.ti{background:var(--sf2);border:2px solid var(--bd);border-radius:12px;padding:14px 18px;color:var(--tx);font-size:20px;width:100%;transition:border .2s;letter-spacing:1px}
.ti:focus{border-color:var(--ac)}.ti.ok{border-color:var(--gn)}.ti.no{border-color:var(--rd)}
.ta{background:var(--sf2);border:2px solid var(--bd);border-radius:12px;padding:14px;color:var(--tx);font-size:14px;width:100%;resize:vertical;min-height:160px;line-height:1.7}
.ta:focus{border-color:var(--ac)}
.mic-status{padding:8px 12px;border-radius:8px;font-size:12px;text-align:center;margin-bottom:12px}
.pbar{display:flex;align-items:center;gap:10px;padding:12px 14px;background:var(--sf2);border-radius:10px;border:1px solid var(--bd)}
.word-row{display:grid;grid-template-columns:30px 1fr 1fr 40px;gap:8px;align-items:center;padding:12px 14px;border-bottom:1px solid var(--bd);font-size:14px}
.word-row:last-child{border-bottom:none}
.rec{width:60px;height:60px;border-radius:50%;border:2.5px solid #e040fb;background:rgba(224,64,251,.06);display:inline-flex;align-items:center;justify-content:center;font-size:28px;flex-shrink:0;min-width:60px;min-height:60px}
.rec.on{animation:micPulse 1.2s ease infinite;border-color:#e040fb;background:rgba(224,64,251,.15)}
.play-rec{width:48px;height:48px;border-radius:50%;border:2px solid var(--ac2);background:rgba(62,207,142,.06);display:inline-flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.tutor-audio{display:flex;align-items:center;gap:10px;padding:10px 14px;background:rgba(92,142,230,.06);border:1px solid rgba(92,142,230,.15);border-radius:10px;margin-bottom:10px}
</style>
</head>
<body>
<div id="app"></div>
<script>

/* ═══════════════════════════════════════════
   VOICE RECORDER (record user, play back to compare)
   ═══════════════════════════════════════════ */
let mediaRecorder = null;
let recordedChunks = [];
let recordedBlob = null;
let recordedUrl = null;

async function startRecording() {
  try {
    if (!micStream) {
      micStream = await navigator.mediaDevices.getUserMedia({ audio: true });
      S.micReady = true;
    }
    recordedChunks = [];
    recordedBlob = null;
    if (recordedUrl) { URL.revokeObjectURL(recordedUrl); recordedUrl = null; }
    mediaRecorder = new MediaRecorder(micStream);
    mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) recordedChunks.push(e.data); };
    mediaRecorder.onstop = () => {
      recordedBlob = new Blob(recordedChunks, { type: "audio/webm" });
      recordedUrl = URL.createObjectURL(recordedBlob);
      S.recording = false;
      S.hasRecording = true;
      render();
    };
    mediaRecorder.start();
    S.recording = true;
    S.hasRecording = false;
    render();
  } catch (e) {
    S.recording = false;
    render();
  }
}

function stopRecording() {
  if (mediaRecorder && mediaRecorder.state === "recording") {
    mediaRecorder.stop();
  }
}

function playRecording() {
  if (recordedUrl) {
    const a = new Audio(recordedUrl);
    a.play();
  }
}

/* ═══════════════════════════════════════════
   STORAGE
   ═══════════════════════════════════════════ */
function buildFolders(words) {
  const folders = [];
  for (let i = 0; i < words.length; i += WPD) {
    const ids = words.slice(i, i + WPD).map(w => w.id);
    const fIdx = Math.floor(i / WPD);
    const existing = S.folders.find(f => f.id === fIdx);
    folders.push({
      id: fIdx,
      ids: ids,
      num: fIdx + 1,
      // reviews: array of 5 timestamps [learned, rev1, rev2, rev3_3d, rev4_7d]
      reviews: existing && existing.reviews && existing.reviews.length >= 6 ? existing.reviews : (existing && existing.reviews ? [...existing.reviews, ...Array(6 - (existing.reviews.length || 0)).fill(null)].slice(0, 6) : [null, null, null, null, null, null]),
      // backward compat: migrate old "done" to reviews[0]
      ...(existing && existing.done && (!existing.reviews || !existing.reviews[0])
        ? { reviews: [existing.done, null, null, null, null, null] } : {})
    });
  }
  return folders;
}

// Helper: get current review step index for a folder (0-4, or 5 = complete)
function getReviewStep(f) {
  for (let i = 0; i < 6; i++) { if (!f.reviews[i]) return i; }
  return 6; // all done
}

// Helper: is next review available now?
function isReviewAvailable(f) {
  const step = getReviewStep(f);
  if (step >= 6) return false; // complete
  if (step === 0) return true; // not started
  const lastReview = f.reviews[step - 1];
  if (!lastReview) return true;
  const delay = REVIEW_STEPS[step].delay;
  return Date.now() >= lastReview + delay;
}

// Helper: when is next review due?
function nextReviewDate(f) {
  const step = getReviewStep(f);
  if (step >= 6 || step === 0) return null;
  const lastReview = f.reviews[step - 1];
  if (!lastReview) return null;
  return new Date(lastReview + REVIEW_STEPS[step].delay);
}

function load() {
  try {
    const d = JSON.parse(localStorage.getItem(STORAGE_KEY));
    if (d && d.words && d.words.length) {
      S.words = d.words;
      S.folders = d.folders || [];
      S.folders = buildFolders(S.words);
    } else {
      initDefaults();
    }
  } catch (e) { initDefaults(); }
}

function initDefaults() {
  S.words = DEFAULT_WORDS.map((w, i) => ({ ...w, id: i, step: 0, nr: 0, kn: false }));
  S.folders = buildFolders(S.words);
}

function save() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({ words: S.words, folders: S.folders }));
  } catch (e) {}
}

/* ═══════════════════════════════════════════
   SPEECH SYNTHESIS (with Chrome bug workarounds)
   ═══════════════════════════════════════════ */
let usVoice = null;

function loadVoices() {
  const vs = speechSynthesis.getVoices();
  usVoice = vs.find(v => v.lang === "en-US" && /google/i.test(v.name))
    || vs.find(v => v.lang === "en-US" && /samantha/i.test(v.name))
    || vs.find(v => v.lang === "en-US")
    || vs.find(v => v.lang.startsWith("en"));
}
speechSynthesis.addEventListener("voiceschanged", loadVoices);
loadVoices();

// Chrome bug #679437: speechSynthesis freezes after ~15s
setInterval(() => { if (speechSynthesis.speaking) speechSynthesis.resume(); }, 5000);

function speakWord(word, rate, onDone) {
  speechSynthesis.cancel();
  setTimeout(() => {
    loadVoices(); // refresh voice each time
    const u = new SpeechSynthesisUtterance(word);
    u.lang = "en-US";
    u.rate = rate || 1;
    u.pitch = 1;
    if (usVoice) u.voice = usVoice;
    if (onDone) {
      const fallbackMs = Math.max(3000, word.length * 400 / (rate || 1));
      const fallback = setTimeout(() => { onDone(); }, fallbackMs);
      u.onend = () => { clearTimeout(fallback); onDone(); };
      u.onerror = () => { clearTimeout(fallback); onDone(); };
    }
    speechSynthesis.speak(u);
  }, 50);
}

function speak(word) { speakWord(word, S.speed); }

/* ═══════════════════════════════════════════
   PLAYER (folder-based, stops after folder by default)
   ═══════════════════════════════════════════ */
function playFolder(fIdx, wIdx) {
  const f = S.folders[fIdx];
  if (!f) { stopPlayer(); return; }
  const fw = getFolderWords(f);
  if (wIdx >= fw.length) {
    // Folder finished
    if (S.autoNext && fIdx + 1 < S.folders.length) {
      S.playerFolderIdx = fIdx + 1;
      S.playerWordIdx = 0;
      render();
      setTimeout(() => {
        if (!S.playing) return;
        playFolder(fIdx + 1, 0);
      }, 800);
    } else {
      stopPlayer();
    }
    return;
  }
  S.playing = true;
  S.playerFolderIdx = fIdx;
  S.playerWordIdx = wIdx;
  render();
  speakWord(fw[wIdx].en, S.speed, () => {
    setTimeout(() => {
      if (!S.playing) return;
      playFolder(fIdx, wIdx + 1);
    }, 600);
  });
}

function stopPlayer() {
  S.playing = false;
  speechSynthesis.cancel();
  S.playerWordIdx = -1;
  S.playerFolderIdx = null;
  render();
}

/* ═══════════════════════════════════════════
   MICROPHONE (request once, keep stream alive)
   ═══════════════════════════════════════════ */
let micStream = null;

async function initMic() {
  try {
    micStream = await navigator.mediaDevices.getUserMedia({ audio: true });
    S.micReady = true;
    // Don't stop tracks — keeps Chrome permission alive
  } catch (e) {
    S.micReady = false;
  }
  render();
}

const SpeechRecognitionAPI = window.SpeechRecognition || window.webkitSpeechRecognition;
let recognizer = null;

function startMic(targetWord) {
  if (!SpeechRecognitionAPI) return;
  if (recognizer) { try { recognizer.abort(); } catch (e) {} }

  recognizer = new SpeechRecognitionAPI();
  recognizer.lang = "en-US";
  recognizer.interimResults = false;
  recognizer.maxAlternatives = 5;

  recognizer.onstart = () => { S.micListening = true; S.micHeard = ""; S.micScore = null; render(); };
  recognizer.onresult = (e) => {
    const res = e.results[0];
    let bestScore = 0, bestText = "";
    for (let i = 0; i < res.length; i++) {
      const text = res[i].transcript;
      const score = similarity(text, targetWord);
      if (score > bestScore) { bestScore = score; bestText = text; }
    }
    S.micHeard = bestText || res[0].transcript;
    S.micScore = Math.round(Math.max(bestScore, similarity(res[0].transcript, targetWord)) * 100);
    S.micListening = false;
    render();
  };
  recognizer.onerror = (e) => {
    S.micListening = false;
    if (e.error !== "aborted") {
      S.micHeard = e.error === "no-speech" ? "(silence \u2014 speak louder)" : "(error: " + e.error + ")";
      S.micScore = 0;
    }
    render();
  };
  recognizer.onend = () => { S.micListening = false; render(); };
  recognizer.start();
}

function normalize(s) { return s.toLowerCase().replace(/[^a-z]/g, ""); }

function similarity(heard, target) {
  const a = normalize(heard), b = normalize(target);
  if (a === b) return 1;
  if (!a || !b) return 0;
  let matches = 0;
  const shorter = a.length <= b.length ? a : b;
  const longer = a.length > b.length ? a : b;
  for (let i = 0; i < shorter.length; i++) {
    if (shorter[i] === longer[i]) matches++;
  }
  return matches / longer.length;
}

function scoreColor(s) { return s >= 85 ? "var(--gn)" : s >= 55 ? "var(--ac)" : "var(--rd)"; }
function formatDate(ts) { return ts ? new Date(ts).toLocaleDateString("en-US", { day: "numeric", month: "short" }) : "—"; }
function daysAgo(ts) { if (!ts) return ""; const d = Math.floor((Date.now() - ts) / 86400000); return d === 0 ? "today" : d + "d ago"; }

function getCurrentFolder() { return S.folders.find(f => f.id === S.folderId); }
function getFolderWords(f) { return f ? f.ids.map(id => S.words.find(w => w.id === id)).filter(Boolean) : []; }

function parseWords(text) {
  const lines = text.split("\n").map(l => l.trim()).filter(l => l);
  const words = [];
  const hasSep = lines.some(l => /\t|—|–|--/.test(l));
  if (hasSep) {
    lines.forEach(l => {
      const parts = l.split(/\t|—|–|--/).map(x => x.trim()).filter(x => x);
      if (parts.length >= 2) {
        const isRuFirst = /[а-яёА-ЯЁ]/.test(parts[0]);
        words.push({ en: isRuFirst ? parts[1] : parts[0], ru: isRuFirst ? parts[0] : parts[1] });
      }
    });
  } else {
    for (let i = 0; i < lines.length - 1; i += 2) {
      const a = lines[i], b = lines[i + 1];
      const aIsRu = /[а-яёА-ЯЁ]/.test(a);
      words.push(aIsRu ? { en: b, ru: a } : { en: a, ru: b });
    }
  }
  return words;
}

function addWords(parsed) {
  const existing = new Set(S.words.map(w => normalize(w.en)));
  let added = 0;
  let maxId = S.words.reduce((m, w) => Math.max(m, w.id), -1);
  parsed.forEach(w => {
    const n = normalize(w.en);
    if (!n || existing.has(n)) return;
    existing.add(n);
    maxId++;
    S.words.push({
      en: w.en.trim(), ru: w.ru.trim(),
      ipa: "", say: "", a: "",
      id: maxId, step: 0, nr: 0, kn: false
    });
    added++;
  });
  S.folders = buildFolders(S.words);
  save();
  return added;
}

/* ═══════════════════════════════════════════
   DOM HELPERS
   ═══════════════════════════════════════════ */
function el(tag, attrs, ...children) {
  const e = document.createElement(tag);
  if (attrs) {
    Object.entries(attrs).forEach(([k, v]) => {
      if (k === "style" && typeof v === "object") Object.assign(e.style, v);
      else if (k === "className") e.className = v;
      else if (k.startsWith("on")) e.addEventListener(k.slice(2).toLowerCase(), v);
      else e.setAttribute(k, v);
    });
  }
  children.flat(Infinity).forEach(c => {
    if (c == null || c === false) return;
    e.appendChild(typeof c === "string" || typeof c === "number" ? document.createTextNode(String(c)) : c);
  });
  return e;
}

/* ═══════════════════════════════════════════
   SWIPE HANDLER
   ═══════════════════════════════════════════ */
let touchStartX = 0, touchStartY = 0;

function setupSwipe(element, onLeft, onRight) {
  element.addEventListener("touchstart", e => {
    touchStartX = e.changedTouches[0].screenX;
    touchStartY = e.changedTouches[0].screenY;
  }, { passive: true });
  element.addEventListener("touchend", e => {
    const dx = e.changedTouches[0].screenX - touchStartX;
    const dy = e.changedTouches[0].screenY - touchStartY;
    if (Math.abs(dx) > 50 && Math.abs(dx) > Math.abs(dy)) {
      if (dx < 0 && onLeft) onLeft();
      if (dx > 0 && onRight) onRight();
    }
  }, { passive: true });
}

  const wordsPerDay = 11;

  let wordsDone = 0;       // fully reinforced (step 5)

  S.folders.forEach(f => {

function renderPlayer(wrap) {
  const b = el("div", { style: { animation: "fadeUp .3s ease" } });
  wrap.appendChild(b);

  b.appendChild(el("div", { style: { fontSize: "18px", fontWeight: "700", color: "var(--ac)", marginBottom: "14px" } }, "\u{1F3A7} Player"));

  // Speed + auto-next
  b.appendChild(el("div", { style: { display: "flex", gap: "4px", marginBottom: "14px", flexWrap: "wrap", alignItems: "center" } },
    el("span", { style: { fontSize: "12px", color: "var(--tx2)", marginRight: "6px" } }, "Speed:"),
    ...[0.5, 0.75, 1, 1.25, 1.5, 2].map(s => el("button", {
      style: {
        background: S.speed === s ? "rgba(240,192,64,.12)" : "transparent",
        border: "1.5px solid " + (S.speed === s ? "var(--ac)" : "var(--bd)"),
        color: S.speed === s ? "var(--ac)" : "var(--tx2)",
        borderRadius: "6px", padding: "6px 12px", fontSize: "13px", minHeight: "40px"
      },
      onClick: () => { S.speed = s; render(); }
    }, s + "x")),
    el("label", { style: { display: "flex", alignItems: "center", gap: "6px", marginLeft: "10px", fontSize: "12px", color: "var(--tx2)", cursor: "pointer" } },
      (() => { const cb = document.createElement("input"); cb.type = "checkbox"; cb.checked = S.autoNext; cb.addEventListener("change", () => { S.autoNext = !S.autoNext; render(); }); return cb; })(),
      "Auto-next"
    )
  ));

  // Folder list
  S.folders.forEach((f, fi) => {
    const fw = getFolderWords(f);
    const isPlaying = S.playerFolderIdx === fi && S.playing;
    const currentWord = isPlaying && fw[S.playerWordIdx] ? fw[S.playerWordIdx].en : "";

    b.appendChild(el("div", {
      style: {
        display: "flex", alignItems: "center", gap: "10px", padding: "12px",
        background: isPlaying ? "rgba(240,192,64,.06)" : "var(--sf)",
        border: "1.5px solid " + (isPlaying ? "var(--ac)" : "var(--bd)"),
        borderRadius: "12px", marginBottom: "8px"
      }
    },
      el("button", {
        className: "spk", style: { width: "46px", height: "46px", fontSize: "18px" },
        onClick: () => isPlaying ? stopPlayer() : playFolder(fi, 0)
      }, isPlaying ? "\u23F9" : "\u25B6"),
      el("div", { style: { flex: "1", minWidth: 0 } },
        el("div", { style: { fontSize: "14px", fontWeight: "600", color: isPlaying ? "var(--ac)" : "var(--tx)" } }, "Day " + f.num),
        el("div", { style: { fontSize: "12px", color: "var(--tx2)", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" } },
          fw.length + " words" + (isPlaying ? " \u2014 " + currentWord + " (" + (S.playerWordIdx + 1) + "/" + fw.length + ")" : "")
        )
      )
    ));
  });
}

/* ── ADD WORDS ── */
function renderAdd(wrap) {
  const b = el("div", { style: { animation: "fadeUp .3s ease" } });
  wrap.appendChild(b);

  b.appendChild(el("div", { style: { fontSize: "18px", fontWeight: "700", color: "var(--ac)", marginBottom: "14px" } }, "+ Add"));

  const ta = el("textarea", {
    className: "ta",
    placeholder: "apple\nword_translation\nhouse\nword_translation\n\nor: apple \u2014 word_translation",
    onInput: (e) => { S.addText = e.target.value; }
  });
  ta.value = S.addText;
  b.appendChild(ta);

  b.appendChild(el("div", { style: { display: "flex", gap: "8px", marginTop: "12px" } },
    el("button", {
      style: { flex: "1", padding: "14px", borderRadius: "12px", fontSize: "15px", fontWeight: "600", background: "var(--ac)", color: "#000" },
      onClick: () => {
        const parsed = parseWords(S.addText);
        if (parsed.length) {
          const existing = new Set(S.words.map(w => normalize(w.en)));
          S.addPreview = parsed.map(w => ({
            ...w,
            dup: existing.has(normalize(w.en))
          }));
        }
        render();
      }
    }, "\u{1F50D} Preview"),
    el("button", {
      style: { padding: "14px 20px", borderRadius: "12px", fontSize: "15px", fontWeight: "600", background: "var(--sf2)", color: "var(--tx)", border: "1.5px solid var(--bd)" },
      onClick: () => {
        const blob = new Blob([JSON.stringify({ words: S.words, folders: S.folders }, null, 2)], { type: "application/json" });
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = "yagodkin-backup-" + new Date().toISOString().slice(0, 10) + ".json";
        a.click();
      }
    }, "\u{1F4BE} Backup")
  ));

  // Preview
  if (S.addPreview) {
    const newWords = S.addPreview.filter(w => !w.dup);
    b.appendChild(el("div", { style: { marginTop: "14px", padding: "14px", background: "var(--sf)", border: "1.5px solid var(--bd)", borderRadius: "12px" } },
      el("div", { style: { fontSize: "14px", fontWeight: "600", marginBottom: "8px" } },
        "Found: " + S.addPreview.length + " | New: " + newWords.length + " | Duplicates: " + (S.addPreview.length - newWords.length)
      ),
      ...S.addPreview.map(w => el("div", {
        style: { fontSize: "13px", padding: "4px 0", color: w.dup ? "var(--rd)" : "var(--tx)", opacity: w.dup ? 0.5 : 1 }
      }, (w.dup ? "\u274C " : "\u2705 ") + w.en + " \u2014 " + w.ru)),
      newWords.length > 0 ? el("button", {
        style: { marginTop: "10px", padding: "12px", width: "100%", borderRadius: "10px", fontSize: "15px", fontWeight: "600", background: "var(--ac2)", color: "#000" },
        onClick: () => {
          const n = addWords(S.addPreview.filter(w => !w.dup));
          S.addText = "";
          S.addPreview = null;
          render();
          alert("Added: " + n + " words");
        }
      }, "\u2795 Add " + newWords.length + " words") : null
    ));
  }

  // JSON Import from Claude
  b.appendChild(el("div", { style: { marginTop: "16px", padding: "14px", background: "var(--sf)", border: "1.5px solid var(--bd)", borderRadius: "12px" } },
    el("div", { style: { fontSize: "14px", fontWeight: "700", color: "var(--ac)", marginBottom: "8px" } }, "\u{1F4E5} Import from Claude"),
    el("div", { style: { fontSize: "12px", color: "var(--tx2)", marginBottom: "8px" } }, "Paste JSON from Claude:"),
    (() => {
      const ta = el("textarea", {
        className: "ta", style: { minHeight: "80px", fontSize: "12px" },
        placeholder: '[{"en":"word","ru":"\u043F\u0435\u0440\u0435\u0432\u043E\u0434","ipa":"/w\u025Crd/","say":"\u0412\u042D\u0420\u0414","a":"\u0430\u0441\u0441\u043E\u0446\u0438\u0430\u0446\u0438\u044F"}]'
      });
      return ta;
    })(),
    el("button", {
      style: { marginTop: "8px", padding: "10px", width: "100%", borderRadius: "8px", fontSize: "14px", fontWeight: "600", background: "var(--bl)", color: "#fff" },
      onClick: (e) => {
        const ta = e.target.parentNode.querySelector("textarea");
        try {
          const data = JSON.parse(ta.value);
          if (!Array.isArray(data)) throw new Error("not array");
          const existing = new Set(S.words.map(w => normalize(w.en)));
          let added = 0, maxId = S.words.reduce((m, w) => Math.max(m, w.id), -1);
          data.forEach(w => {
            if (!w.en) return;
            const n = normalize(w.en);
            if (existing.has(n)) return;
            existing.add(n); maxId++;
            S.words.push({ en: w.en, ru: w.ru || "", ipa: w.ipa || "", say: w.say || "", a: w.a || "", id: maxId, step: 0, nr: 0, kn: false });
            added++;
          });
          S.folders = buildFolders(S.words); save();
          ta.value = "";
          render();
          alert("Added: " + added + " words");
        } catch (err) { alert("JSON error: " + err.message); }
      }
    }, "\u{1F4E5} Import")
  ));

  // Reset button
  b.appendChild(el("div", { style: { marginTop: "20px", textAlign: "center" } },
    el("button", {
      style: { padding: "10px 20px", borderRadius: "8px", fontSize: "13px", color: "var(--rd)", background: "transparent", border: "1px solid rgba(239,83,80,.2)" },
      onClick: () => {
        if (confirm("Reset all data? This will delete all words and progress.")) {
          localStorage.removeItem(STORAGE_KEY);
          initDefaults();
          save();
          S.addText = "";
          S.addPreview = null;
          render();
        }
      }
    }, "\u{1F5D1}\uFE0F Reset")
  ));
}

/* ── FOLDER VIEW ── */
function renderFolder(wrap) {
  const f = getCurrentFolder();
  if (!f) { S.view = "dash"; render(); return; }
  const fw = getFolderWords(f);
  const b = el("div", { style: { animation: "fadeUp .3s ease" } });
  wrap.appendChild(b);

  // Header + Review steps
  const step = getReviewStep(f);
  const isComplete = step >= 5;
  const available = isReviewAvailable(f);

  b.appendChild(el("div", { style: { display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: "8px" } },
    el("div", null,
      el("div", { style: { fontSize: "18px", fontWeight: "700", color: "var(--ac)" } }, "Day " + f.num),
      el("div", { style: { fontSize: "12px", color: "var(--tx2)" } }, fw.length + " words")
    ),
    isComplete
      ? el("div", { style: { fontSize: "13px", color: "var(--gn)", fontWeight: "700" } }, "\u2705 Reinforced!")
      : available
        ? el("button", {
            style: { padding: "10px 16px", borderRadius: "10px", background: step === 0 ? "var(--ac)" : "var(--rd)", color: step === 0 ? "#000" : "#fff", fontSize: "13px", fontWeight: "700" },
            onClick: () => { f.reviews[step] = Date.now(); save(); render(); }
          }, REVIEW_STEPS[step].icon + " " + REVIEW_STEPS[step].label)
        : el("div", { style: { fontSize: "12px", color: "var(--ac)", fontWeight: "600" } },
            REVIEW_STEPS[step].icon + " " + REVIEW_STEPS[step].label + " \u2014 " + formatDate(nextReviewDate(f)?.getTime()))
  ));

  // Review progress bar
  const stepsBar = el("div", { style: { display: "flex", gap: "4px", marginBottom: "12px" } });
  REVIEW_STEPS.forEach((rs, i) => {
    const done = f.reviews[i] !== null;
    const current = i === step;
    stepsBar.appendChild(el("div", { style: {
      flex: "1", textAlign: "center", padding: "6px 2px", borderRadius: "6px", fontSize: "11px", fontWeight: "600",
      background: done ? "rgba(76,175,128,.12)" : current && available ? "rgba(239,83,80,.1)" : "var(--sf2)",
      color: done ? "var(--gn)" : current && available ? "var(--rd)" : "var(--tx2)",
      border: "1px solid " + (done ? "rgba(76,175,128,.2)" : current ? (available ? "rgba(239,83,80,.3)" : "rgba(240,192,64,.2)") : "var(--bd)")
    } },
      done ? "\u2705" : rs.icon,
      el("div", { style: { fontSize: "9px", marginTop: "2px" } }, rs.label),
      done ? el("div", { style: { fontSize: "9px", color: "var(--tx2)" } }, formatDate(f.reviews[i])) : null
    ));
  });
  b.appendChild(stepsBar);

  // Direction + sub-mode toggles
  b.appendChild(el("div", { style: { display: "flex", gap: "8px", marginBottom: "12px", flexWrap: "wrap" } },
    el("div", { className: "toggle", style: { flex: "1" } },
      el("button", { className: S.direction === "ru" ? "on" : "", onClick: () => { S.direction = "ru"; S.flipped = false; render(); } }, "\u{1F1F7}\u{1F1FA}\u2192\u{1F1EC}\u{1F1E7}"),
      el("button", { className: S.direction === "en" ? "on" : "", onClick: () => { S.direction = "en"; S.flipped = false; render(); } }, "\u{1F1EC}\u{1F1E7}\u2192\u{1F1F7}\u{1F1FA}")
    ),
    el("div", { className: "toggle", style: { flex: "1.5" } },
      el("button", { className: S.sub === "cards" ? "on" : "", onClick: () => { S.sub = "cards"; render(); } }, "\u{1F9E0}"),
      el("button", { className: S.sub === "review" ? "on" : "", onClick: () => { S.sub = "review"; S.cardIdx = 0; S.flipped = false; render(); } }, "\u{1F504}"),
      el("button", { className: S.sub === "dictation" ? "on" : "", onClick: () => { S.sub = "dictation"; S.dictInput = ""; S.dictResult = null; render(); } }, "\u270D\uFE0F"),
      el("button", { className: S.sub === "list" ? "on" : "", onClick: () => { S.sub = "list"; render(); } }, "\u{1F4DD}")
    )
  ));

  // Folder player bar
  const fIdx = S.folders.indexOf(f);
  const isPlaying = S.playerFolderIdx === fIdx && S.playing;
  b.appendChild(el("div", { className: "pbar", style: { marginBottom: "14px" } },
    el("button", {
      className: "spk", style: { width: "40px", height: "40px", fontSize: "16px" },
      onClick: () => isPlaying ? stopPlayer() : playFolder(fIdx, 0)
    }, isPlaying ? "\u23F9" : "\u25B6"),
    el("div", { style: { flex: "1", fontSize: "13px", color: "var(--tx2)" } },
      isPlaying ? fw[S.playerWordIdx]?.en + " (" + (S.playerWordIdx + 1) + "/" + fw.length + ")" : "Play all " + fw.length + " words"
    ),
    el("select", {
      style: { background: "var(--sf2)", color: "var(--ac)", border: "1px solid var(--bd)", borderRadius: "6px", padding: "4px 8px", fontSize: "12px" },
      onChange: (e) => { S.speed = parseFloat(e.target.value); }
    }, ...[0.5, 0.75, 1, 1.25, 1.5, 2].map(s => {
      const opt = el("option", { value: String(s) }, s + "x");
      if (S.speed === s) opt.selected = true;
      return opt;
    }))
  ));

  // Tutor audio section
  if (TUTOR_AUDIO.length) {
    const tutorBox = el("div", { style: { marginBottom: "14px" } });
    tutorBox.appendChild(el("div", { style: { fontSize: "12px", color: "var(--tx2)", fontWeight: "600", marginBottom: "6px" } }, "\u{1F3A7} Tutor audio"));
    TUTOR_AUDIO.forEach(ta => {
      const audioEl = el("div", { className: "tutor-audio" },
        el("div", { style: { fontSize: "13px", color: "var(--bl)", flex: "1" } }, ta.label),
        el("audio", { controls: "controls", style: { height: "36px", flex: "2" } },
          el("source", { src: encodeURI(ta.file), type: "audio/mpeg" })
        )
      );
      tutorBox.appendChild(audioEl);
    });
    b.appendChild(tutorBox);
  }

  if (S.sub === "cards") renderCards(b, fw);
  else if (S.sub === "review") renderReview(b, fw);
  else if (S.sub === "dictation") renderDictation(b, fw);
  else if (S.sub === "list") renderList(b, fw);
}

/* ── CARDS ── */
// Helper: render association(s) — supports string or array of 3
function renderAssoc(w) {
  if (!w.a) return null;
  const assocs = Array.isArray(w.a) ? w.a : [w.a];
  return el("div", { className: "assoc" },
    el("div", { style: { fontSize: "10px", color: "var(--ac)", fontWeight: "600", marginBottom: "4px" } }, "\u{1F4A1} Association"),
    ...assocs.map((a, i) => el("div", { style: { fontSize: "12px", color: assocs.length > 1 ? (i === 0 ? "var(--tx)" : "var(--tx2)") : "var(--tx)", lineHeight: "1.4", marginBottom: assocs.length > 1 ? "4px" : "0", paddingLeft: assocs.length > 1 ? "0" : "0" } },
      assocs.length > 1 ? el("span", { style: { color: "var(--ac)", fontWeight: "700", fontSize: "11px" } }, (i + 1) + ". ") : null,
      a
    ))
  );
}

function renderCards(parent, fw) {
  if (!fw.length) return;
  const w = fw[S.cardIdx] || fw[0];
  const isBack = S.flipped;

  const cardEl = el("div", {
    className: "card" + (isBack ? " back" : "") + (S.cardAnim ? " " + S.cardAnim : ""),
    onClick: () => {
      S.flipped = !S.flipped;
      S.cardAnim = "animFlip";
      render();
      setTimeout(() => { S.cardAnim = ""; }, 400);
    },
    onAnimationend: () => { S.cardAnim = ""; }
  });

  if (S.direction === "ru") {
    // RU→EN mode
    if (!isBack) {
      // Front: Russian word
      cardEl.appendChild(el("div", { style: { fontSize: "12px", color: "var(--tx2)", marginBottom: "8px" } }, "Translate \u2192"));
      cardEl.appendChild(el("div", { style: { fontSize: "32px", fontWeight: "800", textAlign: "center" } }, w.ru));
    } else {
      // Back: English + IPA + transcription + speaker + association
      cardEl.appendChild(el("div", { style: { fontSize: "34px", fontWeight: "800", color: "var(--ac2)", textAlign: "center" } }, w.en));
      if (w.ipa) cardEl.appendChild(el("div", { style: { fontSize: "16px", color: "var(--tx2)", marginTop: "4px" } }, w.ipa));
      if (w.say) cardEl.appendChild(el("div", { style: { fontSize: "16px", color: "var(--bl)", marginTop: "2px" } }, "[" + w.say + "]"));
      cardEl.appendChild(el("div", { style: { marginTop: "10px" } },
        el("button", { className: "spk", onClick: (e) => { e.stopPropagation(); speak(w.en); } }, "\u{1F50A}")
      ));
      { const ac = renderAssoc(w); if (ac) cardEl.appendChild(ac); }
    }
  } else {
    // EN→RU mode
    if (!isBack) {
      // Front: English + IPA + speaker
      cardEl.appendChild(el("div", { style: { fontSize: "34px", fontWeight: "800", textAlign: "center" } }, w.en));
      if (w.ipa) cardEl.appendChild(el("div", { style: { fontSize: "16px", color: "var(--tx2)", marginTop: "4px" } }, w.ipa));
      if (w.say) cardEl.appendChild(el("div", { style: { fontSize: "16px", color: "var(--bl)", marginTop: "2px" } }, "[" + w.say + "]"));
      cardEl.appendChild(el("div", { style: { marginTop: "10px" } },
        el("button", { className: "spk", onClick: (e) => { e.stopPropagation(); speak(w.en); } }, "\u{1F50A}")
      ));
    } else {
      // Back: Russian translation + association
      cardEl.appendChild(el("div", { style: { fontSize: "30px", fontWeight: "800", color: "var(--ac2)", textAlign: "center" } }, w.ru));
      if (w.say) cardEl.appendChild(el("div", { style: { fontSize: "16px", color: "var(--bl)", marginTop: "4px" } }, "[" + w.say + "]"));
      cardEl.appendChild(el("div", { style: { marginTop: "10px" } },
        el("button", { className: "spk", onClick: (e) => { e.stopPropagation(); speak(w.en); } }, "\u{1F50A}")
      ));
      { const ac = renderAssoc(w); if (ac) cardEl.appendChild(ac); }
    }
  }

  parent.appendChild(cardEl);

  // Setup swipe on card
  setupSwipe(cardEl,
    () => { if (S.cardIdx < fw.length - 1) { S.cardIdx++; S.flipped = false; S.cardAnim = "animL"; S.micScore = null; S.hasRecording = false; render(); } },
    () => { if (S.cardIdx > 0) { S.cardIdx--; S.flipped = false; S.cardAnim = "animR"; S.micScore = null; S.hasRecording = false; render(); } }
  );

  // Navigation arrows + counter
  parent.appendChild(el("div", { className: "nav-arrows" },
    el("button", {
      className: "arrow",
      onClick: () => { if (S.cardIdx > 0) { S.cardIdx--; S.flipped = false; S.cardAnim = "animR"; S.micScore = null; S.hasRecording = false; render(); } }
    }, "\u25C0"),
    el("div", { className: "counter" }, (S.cardIdx + 1) + " / " + fw.length),
    el("button", {
      className: "arrow",
      onClick: () => { if (S.cardIdx < fw.length - 1) { S.cardIdx++; S.flipped = false; S.cardAnim = "animL"; S.micScore = null; S.hasRecording = false; render(); } }
    }, "\u25B6")
  ));

  // Pronunciation section: Speech Recognition + Record & Compare
  const pronContainer = el("div", { style: { display: "flex", flexDirection: "column", alignItems: "center", gap: "10px", marginTop: "8px" } });

  // Row 1: Speech recognition (if available) + transcription hint
  if (SpeechRecognitionAPI) {
    const micRow = el("div", { style: { display: "flex", alignItems: "center", gap: "14px" } });
    micRow.appendChild(el("button", {
      className: "mic" + (S.micListening ? " on" : (S.micScore !== null && S.micScore >= 85 ? " ok" : "")),
      onClick: () => {
        if (!S.micReady) { initMic().then(() => startMic(w.en)); }
        else startMic(w.en);
      }
    }, S.micListening ? "\u{1F534}" : "\u{1F399}\uFE0F"));
    if (w.say) {
      micRow.appendChild(el("div", { style: { fontSize: "16px", color: "var(--bl)" } }, "[" + w.say + "]"));
    }
    pronContainer.appendChild(micRow);

    // Score display with letter-by-letter comparison
    if (S.micScore !== null) {
      const sc = S.micScore;
      const scoreBox = el("div", { style: { textAlign: "center" } });

      // Score number + bar
      scoreBox.appendChild(el("div", { style: { fontSize: "28px", fontWeight: "800", color: scoreColor(sc) } }, sc + "%"));
      scoreBox.appendChild(el("div", { style: { height: "8px", width: "200px", background: "var(--sf3)", borderRadius: "4px", overflow: "hidden", margin: "6px auto" } },
        el("div", { style: { height: "100%", width: sc + "%", background: scoreColor(sc), borderRadius: "4px", transition: "width .3s" } })
      ));

      // "You said" text
      scoreBox.appendChild(el("div", { style: { fontSize: "13px", color: "var(--tx2)", marginTop: "6px" } },
        "You said: \u00AB" + S.micHeard + "\u00BB"
      ));

      // Letter-by-letter comparison
      const heard = (S.micHeard || "").toLowerCase();
      const target = w.en.toLowerCase();
      const letterBox = el("div", { style: { display: "flex", justifyContent: "center", gap: "2px", marginTop: "10px", flexWrap: "wrap" } });

      for (let i = 0; i < target.length; i++) {
        const match = i < heard.length && heard[i] === target[i];
        const partial = i < heard.length;
        letterBox.appendChild(el("div", { style: {
          width: "28px", height: "36px", display: "flex", alignItems: "center", justifyContent: "center",
          borderRadius: "6px", fontSize: "18px", fontWeight: "700", fontFamily: "monospace",
          background: match ? "rgba(76,175,128,.15)" : partial ? "rgba(239,83,80,.15)" : "rgba(110,108,120,.1)",
          color: match ? "var(--gn)" : partial ? "var(--rd)" : "var(--tx2)",
          border: "1.5px solid " + (match ? "var(--gn)" : partial ? "var(--rd)" : "var(--bd)")
        } }, target[i]));
      }
      scoreBox.appendChild(letterBox);

      // Legend
      scoreBox.appendChild(el("div", { style: { display: "flex", justifyContent: "center", gap: "14px", marginTop: "8px", fontSize: "11px" } },
        el("span", { style: { color: "var(--gn)" } }, "\u25CF matched"),
        el("span", { style: { color: "var(--rd)" } }, "\u25CF didn't match"),
        el("span", { style: { color: "var(--tx2)" } }, "\u25CF skipped")
      ));

      // Slow playback button
      scoreBox.appendChild(el("div", { style: { marginTop: "10px" } },
        el("button", {
          style: { padding: "8px 16px", borderRadius: "8px", fontSize: "13px", fontWeight: "600", background: "var(--sf2)", color: "var(--bl)", border: "1.5px solid rgba(92,142,230,.3)" },
          onClick: (e) => { e.stopPropagation(); speakWord(w.en, 0.5); }
        }, "\u{1F40C} Listen slowly")
      ));

      // Tip based on score
      if (sc >= 85) {
        scoreBox.appendChild(el("div", { style: { marginTop: "8px", fontSize: "13px", color: "var(--gn)", fontWeight: "600" } }, "\u2705 Excellent!"));
      } else if (sc >= 55) {
        scoreBox.appendChild(el("div", { style: { marginTop: "8px", fontSize: "13px", color: "var(--ac)" } }, "\u{1F4A1} Listen slowly and repeat"));
      } else {
        scoreBox.appendChild(el("div", { style: { marginTop: "8px", fontSize: "13px", color: "var(--rd)" } }, "\u{1F50A} Listen to reference, note the red letters"));
      }

      pronContainer.appendChild(scoreBox);
    }
  }

  // Row 2: Record & Compare with tutor
  pronContainer.appendChild(el("div", { style: { width: "100%", height: "1px", background: "var(--bd)", margin: "6px 0" } }));
  pronContainer.appendChild(el("div", { style: { fontSize: "12px", color: "var(--tx2)", fontWeight: "600" } }, "\u{1F3A4} Record & compare"));

  const recRow = el("div", { style: { display: "flex", alignItems: "center", gap: "12px" } });

  // Record button
  recRow.appendChild(el("button", {
    className: "rec" + (S.recording ? " on" : ""),
    onClick: () => { S.recording ? stopRecording() : startRecording(); }
  }, S.recording ? "\u23F9" : "\u{1F534}"));

  // Play tutor (TTS) button
  recRow.appendChild(el("button", {
    className: "spk", style: { width: "48px", height: "48px" },
    onClick: (e) => { e.stopPropagation(); speak(w.en); }
  }, "\u{1F50A}"));

  // Play recording button (if available)
  if (S.hasRecording && recordedUrl) {
    recRow.appendChild(el("button", {
      className: "play-rec",
      onClick: (e) => { e.stopPropagation(); playRecording(); }
    }, "\u{1F3A7}"));
  }

  pronContainer.appendChild(recRow);

  if (S.recording) {
    pronContainer.appendChild(el("div", { style: { fontSize: "13px", color: "#e040fb", fontWeight: "600" } }, "\u25CF Recording... press \u23F9 to stop"));
  } else if (S.hasRecording) {
    pronContainer.appendChild(el("div", { style: { fontSize: "12px", color: "var(--tx2)" } },
      "\u{1F50A} = tutor \u00A0\u00A0 \u{1F3A7} = your recording \u00A0\u00A0 Compare!"
    ));
  }

  parent.appendChild(pronContainer);
}

/* ── REVIEW (clean cards, no spoilers) ── */
function getReviewWords(fw) {
  if (!S.shuffledIds) return fw;
  return S.shuffledIds.map(id => fw.find(w => w.id === id)).filter(Boolean);
}

function shuffleWords(fw) {
  const ids = fw.map(w => w.id);
  for (let i = ids.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [ids[i], ids[j]] = [ids[j], ids[i]];
  }
  S.shuffledIds = ids;
  S.cardIdx = 0;
  S.flipped = false;
  render();
}

function renderReview(parent, fw) {
  if (!fw.length) return;
  const rw = getReviewWords(fw);
  const w = rw[S.cardIdx] || rw[0];
  const isBack = S.flipped;

  // Header: label + shuffle button
  parent.appendChild(el("div", { style: { display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: "8px" } },
    el("div", { style: { fontSize: "12px", color: "var(--tx2)" } },
      "\u{1F504} Review \u2014 tap card to check"),
    el("button", {
      style: {
        padding: "6px 14px", borderRadius: "8px", fontSize: "12px", fontWeight: "600",
        background: S.shuffledIds ? "rgba(240,192,64,.12)" : "var(--sf2)",
        color: S.shuffledIds ? "var(--ac)" : "var(--tx2)",
        border: "1.5px solid " + (S.shuffledIds ? "var(--ac)" : "var(--bd)")
      },
      onClick: () => { if (S.shuffledIds) { S.shuffledIds = null; S.cardIdx = 0; S.flipped = false; render(); } else { shuffleWords(fw); } }
    }, S.shuffledIds ? "\u{1F500} Shuffled" : "\u{1F500} Shuffle")
  ));

  const cardEl = el("div", {
    className: "card" + (isBack ? " back" : "") + (S.cardAnim ? " " + S.cardAnim : ""),
    onClick: () => {
      S.flipped = !S.flipped;
      S.cardAnim = "animFlip";
      render();
      setTimeout(() => { S.cardAnim = ""; }, 400);
    }
  });

  if (S.direction === "ru") {
    if (!isBack) {
      // Front: ONLY Russian word
      cardEl.appendChild(el("div", { style: { fontSize: "14px", color: "var(--tx2)", marginBottom: "10px" } }, "Translate \u2192"));
      cardEl.appendChild(el("div", { style: { fontSize: "34px", fontWeight: "800", textAlign: "center" } }, w.ru));
    } else {
      // Back: English word + IPA + Russian transcription
      cardEl.appendChild(el("div", { style: { fontSize: "36px", fontWeight: "800", color: "var(--ac2)", textAlign: "center" } }, w.en));
      if (w.ipa) cardEl.appendChild(el("div", { style: { fontSize: "16px", color: "var(--tx2)", marginTop: "4px" } }, w.ipa));
      if (w.say) cardEl.appendChild(el("div", { style: { fontSize: "16px", color: "var(--bl)", marginTop: "2px" } }, "[" + w.say + "]"));
    }
  } else {
    if (!isBack) {
      // Front: ONLY English word (no hints)
      cardEl.appendChild(el("div", { style: { fontSize: "14px", color: "var(--tx2)", marginBottom: "10px" } }, "Translate \u2192"));
      cardEl.appendChild(el("div", { style: { fontSize: "36px", fontWeight: "800", textAlign: "center" } }, w.en));
    } else {
      // Back: Russian word + IPA + Russian transcription
      cardEl.appendChild(el("div", { style: { fontSize: "36px", fontWeight: "800", color: "var(--ac2)", textAlign: "center" } }, w.ru));
      if (w.ipa) cardEl.appendChild(el("div", { style: { fontSize: "16px", color: "var(--tx2)", marginTop: "4px" } }, w.ipa));
      if (w.say) cardEl.appendChild(el("div", { style: { fontSize: "16px", color: "var(--bl)", marginTop: "2px" } }, "[" + w.say + "]"));
    }
  }

  parent.appendChild(cardEl);

  // Swipe
  setupSwipe(cardEl,
    () => { if (S.cardIdx < rw.length - 1) { S.cardIdx++; S.flipped = false; S.cardAnim = "animL"; render(); } },
    () => { if (S.cardIdx > 0) { S.cardIdx--; S.flipped = false; S.cardAnim = "animR"; render(); } }
  );

  // Arrows
  parent.appendChild(el("div", { className: "nav-arrows" },
    el("button", { className: "arrow", onClick: () => { if (S.cardIdx > 0) { S.cardIdx--; S.flipped = false; S.cardAnim = "animR"; render(); } } }, "\u25C0"),
    el("div", { className: "counter" }, (S.cardIdx + 1) + " / " + rw.length),
    el("button", { className: "arrow", onClick: () => { if (S.cardIdx < rw.length - 1) { S.cardIdx++; S.flipped = false; S.cardAnim = "animL"; render(); } } }, "\u25B6")
  ));
}

/* ── DICTATION ── */
function renderDictation(parent, fw) {
  if (!fw.length) return;
  const w = fw[S.cardIdx] || fw[0];

  const container = el("div", { style: { textAlign: "center" } });

  if (S.direction === "ru") {
    // Show Russian, type English
    container.appendChild(el("div", { style: { fontSize: "28px", fontWeight: "800", marginBottom: "14px" } }, w.ru));
    container.appendChild(el("div", { style: { marginBottom: "14px" } },
      el("button", { className: "spk", onClick: () => speak(w.en) }, "\u{1F50A}")
    ));
    container.appendChild(el("div", { style: { fontSize: "13px", color: "var(--tx2)", marginBottom: "10px" } }, "Type in English"));
  } else {
    // Only audio, type what you hear
    container.appendChild(el("div", { style: { fontSize: "14px", color: "var(--tx2)", marginBottom: "14px" } }, "Listen and type"));
    container.appendChild(el("div", { style: { marginBottom: "14px" } },
      el("button", { className: "spk", style: { width: "64px", height: "64px", fontSize: "28px" }, onClick: () => speak(w.en) }, "\u{1F50A}")
    ));
  }

  const input = el("input", {
    className: "ti" + (S.dictResult === true ? " ok" : S.dictResult === false ? " no" : ""),
    type: "text",
    placeholder: "...",
    value: S.dictInput,
    onInput: (e) => { S.dictInput = e.target.value; },
    onKeydown: (e) => { if (e.key === "Enter") checkDictation(w); }
  });
  container.appendChild(input);

  container.appendChild(el("div", { style: { display: "flex", gap: "8px", marginTop: "12px", justifyContent: "center" } },
    el("button", {
      style: { padding: "12px 24px", borderRadius: "10px", fontSize: "15px", fontWeight: "600", background: "var(--ac)", color: "#000" },
      onClick: () => checkDictation(w)
    }, "Check"),
    el("button", {
      style: { padding: "12px 24px", borderRadius: "10px", fontSize: "15px", fontWeight: "600", background: "var(--sf2)", color: "var(--tx)", border: "1.5px solid var(--bd)" },
      onClick: () => { nextDictCard(fw); }
    }, "Next \u25B6")
  ));

  // Result
  if (S.dictResult !== null) {
    if (S.dictResult) {
      container.appendChild(el("div", { style: { marginTop: "14px", padding: "12px", background: "rgba(76,175,128,.08)", border: "1px solid rgba(76,175,128,.2)", borderRadius: "10px", color: "var(--gn)", fontSize: "16px", fontWeight: "600" } },
        "\u2713 Correct!"
      ));
    } else {
      container.appendChild(el("div", { style: { marginTop: "14px", padding: "12px", background: "rgba(239,83,80,.08)", border: "1px solid rgba(239,83,80,.2)", borderRadius: "10px" } },
        el("div", { style: { color: "var(--rd)", fontSize: "14px", fontWeight: "600" } }, "\u2717 Correct answer:"),
        el("div", { style: { fontSize: "22px", fontWeight: "800", color: "var(--ac2)", marginTop: "4px" } }, w.en),
        w.ipa ? el("div", { style: { fontSize: "14px", color: "var(--tx2)", marginTop: "2px" } }, w.ipa) : null
      ));
    }
  }

  parent.appendChild(container);

  // Auto-focus input
  setTimeout(() => input.focus(), 100);
}

function checkDictation(w) {
  const input = normalize(S.dictInput);
  const target = normalize(w.en);
  S.dictResult = input === target;
  S.dictAnswer = w.en;
  render();
}

function nextDictCard(fw) {
  if (S.cardIdx < fw.length - 1) S.cardIdx++;
  else S.cardIdx = 0;
  S.dictInput = "";
  S.dictResult = null;
  render();
}

/* ── WORD LIST ── */
function renderList(parent, fw) {
  const table = el("div", { className: "sf" });

  // Header
  table.appendChild(el("div", { className: "word-row", style: { background: "var(--sf2)", fontWeight: "600", fontSize: "12px", color: "var(--tx2)" } },
    el("div", null, "#"),
    el("div", null, "English"),
    el("div", null, "Russian"),
    el("div", null, "\u{1F50A}")
  ));

  fw.forEach((w, i) => {
    const row = el("div", null);
    row.appendChild(el("div", { className: "word-row" },
      el("div", { style: { color: "var(--tx2)", fontSize: "12px" } }, String(i + 1)),
      el("div", null,
        el("div", { style: { fontWeight: "600" } }, w.en),
        w.ipa ? el("div", { style: { fontSize: "12px", color: "var(--tx2)" } }, w.ipa) : null,
        w.say ? el("div", { style: { fontSize: "12px", color: "var(--bl)" } }, "[" + w.say + "]") : null
      ),
      el("div", { style: { fontSize: "13px" } }, w.ru),
      el("div", null,
        el("button", {
          style: { background: "none", border: "none", fontSize: "18px", padding: "4px", cursor: "pointer" },
          onClick: () => speak(w.en)
        }, "\u{1F50A}")
      )
    ));
    if (w.a) {
      const assocs = Array.isArray(w.a) ? w.a : [w.a];
      row.appendChild(el("div", { style: { padding: "0 14px 10px 38px", fontSize: "11px", color: "var(--ac)", lineHeight: "1.4", borderBottom: "1px solid var(--bd)" } },
        ...assocs.map((a, i) => el("div", { style: { color: i === 0 ? "var(--ac)" : "var(--tx2)", marginBottom: "2px" } },
          assocs.length > 1 ? (i + 1) + ". " + a : "\u{1F4A1} " + a
        ))
      ));
    }
    table.appendChild(row);
  });

  parent.appendChild(table);
}

/* ═══════════════════════════════════════════
   KEYBOARD SHORTCUTS
   ═══════════════════════════════════════════ */
document.addEventListener("keydown", (e) => {
  if (S.view !== "folder" || (S.sub !== "cards" && S.sub !== "review")) return;
  const f = getCurrentFolder();
  if (!f) return;
  const fw = getFolderWords(f);

  if (e.key === "ArrowLeft" && S.cardIdx > 0) {
    S.cardIdx--; S.flipped = false; S.cardAnim = "animR"; S.micScore = null; S.hasRecording = false; render();
  } else if (e.key === "ArrowRight" && S.cardIdx < fw.length - 1) {
    S.cardIdx++; S.flipped = false; S.cardAnim = "animL"; S.micScore = null; S.hasRecording = false; render();
  } else if (e.key === " " || e.key === "Enter") {
    e.preventDefault();
    S.flipped = !S.flipped; S.cardAnim = "animFlip"; render();
    setTimeout(() => { S.cardAnim = ""; }, 400);
  }
});

/* ═══════════════════════════════════════════
   INIT
   ═══════════════════════════════════════════ */
load();
save();
render();

// Try to init mic on first user gesture
document.addEventListener("click", function initOnce() {
  if (!S.micReady && SpeechRecognitionAPI) {
    initMic();
  }
  document.removeEventListener("click", initOnce);
}, { once: true });
</script>
